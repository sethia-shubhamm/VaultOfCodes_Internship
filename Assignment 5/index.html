<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkwell - A Writing Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="grain"></div>


<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="brand" data-route="home">
      <svg class="brand-mark" width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M5 21V5l16 16V5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Inkwell
    </a>
    <div class="nav-links">
      <a href="#" data-route="home">Read</a>
      <a href="#" data-route="categories">Categories</a>
      <a href="#" data-route="about">About</a>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" id="searchToggle" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M16 16l-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="btn-write" id="writeBtn" data-route="editor">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M10.5 1.5l3 3L4.5 13.5H1.5v-3l9-9z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        Write
      </button>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="search-panel" id="searchPanel">
    <div class="search-inner">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M16 16l-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Search articles, authors, topics…" autocomplete="off" />
      <button class="icon-btn" id="searchClose" aria-label="Close search">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#" data-route="home">Read</a>
  <a href="#" data-route="categories">Categories</a>
  <a href="#" data-route="about">About</a>
  <a href="#" data-route="editor" class="mobile-write">Write a story</a>
</div>


<main id="app"></main>


<div class="toast" id="toast"></div>


<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="brand" style="pointer-events:none">
        <svg class="brand-mark" width="22" height="22" viewBox="0 0 26 26" fill="none"><path d="M5 21V5l16 16V5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Inkwell
      </div>
      <p>A quiet place to write, read, and think out loud.</p>
    </div>
    <div class="footer-col">
      <h4>Explore</h4>
      <a href="#" data-route="home">Latest stories</a>
      <a href="#" data-route="categories">Categories</a>
      <a href="#" data-route="editor">Start writing</a>
    </div>
    <div class="footer-col">
      <h4>Project</h4>
      <a href="#" data-route="about">About Inkwell</a>
      <span class="footer-meta">Final Project · CMS Blog Platform</span>
    </div>
  </div>
  <div class="footer-bottom">
    <span>© 2026 Inkwell. Built as a web development capstone project.</span>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
